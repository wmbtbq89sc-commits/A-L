<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Closed</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
}

/* النص الأساسي */
.main-text {
  font-size: 18px;
  opacity: 0.8;
}

/* hidden message ( خفيف ) */
.hidden {
  margin-top: 20px;
  font-size: 15px;
  color: rgba(255,255,255,0.15);
  cursor: pointer;
  transition: 0.3s;
}

.hidden:hover {
  color: rgba(255,255,255,0.3);
}

/* الشاشة السوداء */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* الرسالة النهائية */
.final-text {
  font-size: 20px;
  opacity: 0;
  transform: translateY(10px);
  transition: 0.6s;
}
</style>

</head>

<body>

<div class="main-text">
  I don’t know why you react like that, 
  but im just leaving you for your peace.. i still love you okay?
</div>

<div class="hidden" onclick="openHidden()">
  Hidden message "press here"
</div>

<div class="overlay" id="overlay">
  <div class="final-text" id="finalText">
    Focus on your life and forget about me. you wanted space right? so there you go.. I give you what you want.. you should be happy now
  </div>
</div>

<script>
function openHidden() {
  const overlay = document.getElementById("overlay");
  const text = document.getElementById("finalText");

  overlay.style.display = "flex";

  setTimeout(() => {
    text.style.opacity = "1";
    text.style.transform = "translateY(0)";
  }, 200);
}
</script>

</body>
</html>
